version: '3.8'

services:
  backend:
    build:
      context: ./backend/src/BoardApp.Api
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - boardapp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - boardapp-network

networks:
  boardapp-network:
    driver: bridge