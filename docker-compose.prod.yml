services:
  postgres:
    image: postgres:16-alpine
    container_name: boardapp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - boardapp-network

  flyway:
    image: flyway/flyway:10-alpine
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER}
      -password=${POSTGRES_PASSWORD}
      -connectRetries=60
      migrate
    volumes:
      - ./backend/flyway/sql:/flyway/sql
    networks:
      - boardapp-network

  backend:
    build:
      context: ./backend/src/BoardApp.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__BoardApp=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Auth__JwtKey=${JWT_SECRET}
    networks:
      - boardapp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - boardapp-network

  nginx:
    image: nginx:alpine
    container_name: boardapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - boardapp-network

networks:
  boardapp-network:
    driver: bridge

volumes:
  postgres-data:
